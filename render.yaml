services:
  - type: web
    name: sikham-school
    runtime: docker
    plan: free
    region: singapore
    branch: main
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sikham-school-db
          property: connectionString
      - key: IMPORT_DB_ON_START
        value: "true"

databases:
  - name: sikham-school-db
    plan: free
    region: singapore
    databaseName: school_db
    user: school_user
